<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AttentionX – Neural Video Repurposing</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="dashboard">
    <header>
      <h1>⚡ ATTENTIONX</h1>
      <p class="tagline">Automated Content Repurposing Engine. Extracting value from long‑form video.</p>
    </header>

    <div class="status-card">
      <span class="status-label">ENGINE STATUS</span>
      <span class="status-value active"><i class="fas fa-circle"></i> ACTIVE</span>
    </div>

    <div class="media-section">
      <h2><i class="fas fa-video"></i> MEDIA SOURCE</h2>
      <div class="upload-area" id="uploadArea">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Load Source Video</p>
        <span class="file-hint">MP4, MOV up to 500MB</span>
        <input type="file" id="videoInput" accept=".mp4,.mov" style="display:none">
        <button id="selectFileBtn" class="btn-secondary">Choose file</button>
      </div>
      <div id="fileInfo" class="file-info" style="display:none;"></div>
      <button id="startAnalysisBtn" class="btn-primary" disabled>START NEURAL ANALYSIS</button>
      <div class="time-limit">
        <i class="fas fa-hourglass-half"></i> Max 60s per clip
      </div>
    </div>

    <div id="resultsSection" class="results-section" style="display:none;">
      <h2><i class="fas fa-film"></i> EMOTIONAL CLIPS · SMART CROP</h2>
      <div id="clipsGrid" class="clips-grid"></div>
    </div>

    <div id="loadingOverlay" class="loading-overlay" style="display:none;">
      <div class="spinner"></div>
      <p>Analyzing video... this may take a few minutes.</p>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:5000/api';
    let selectedFile = null;

    // DOM elements
    const uploadArea = document.getElementById('uploadArea');
    const videoInput = document.getElementById('videoInput');
    const selectFileBtn = document.getElementById('selectFileBtn');
    const fileInfo = document.getElementById('fileInfo');
    const startBtn = document.getElementById('startAnalysisBtn');
    const resultsSection = document.getElementById('resultsSection');
    const clipsGrid = document.getElementById('clipsGrid');
    const loadingOverlay = document.getElementById('loadingOverlay');

    // Trigger file picker
    selectFileBtn.addEventListener('click', () => videoInput.click());
    uploadArea.addEventListener('click', () => videoInput.click());

    videoInput.addEventListener('change', (e) => {
      if (e.target.files.length) {
        selectedFile = e.target.files[0];
        fileInfo.innerHTML = `<i class="fas fa-check-circle"></i> ${selectedFile.name} (${(selectedFile.size / (1024*1024)).toFixed(2)} MB)`;
        fileInfo.style.display = 'block';
        startBtn.disabled = false;
      } else {
        selectedFile = null;
        fileInfo.style.display = 'none';
        startBtn.disabled = true;
      }
    });

    startBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      // Show loading overlay
      loadingOverlay.style.display = 'flex';
      startBtn.disabled = true;

      // Prepare form data
      const formData = new FormData();
      formData.append('video', selectedFile);

      try {
        // 1. Upload video and trigger pipeline
        const response = await fetch(`${API_BASE}/process`, {
          method: 'POST',
          body: formData
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Processing failed');

        // 2. Display results
        renderClips(data.clips);
        resultsSection.style.display = 'block';
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        loadingOverlay.style.display = 'none';
        startBtn.disabled = false;
      }
    });

    function renderClips(clips) {
      clipsGrid.innerHTML = '';
      clips.forEach(clip => {
        const card = document.createElement('div');
        card.className = 'clip-card';
        card.innerHTML = `
          <div class="clip-header">
            <span class="clip-title">CLIP ${clip.id}</span>
            <span class="timestamp">${clip.start} - ${clip.end}</span>
          </div>
          <div class="quote">“${clip.quote}”</div>
          <div class="energy-tag"><i class="fas fa-bolt"></i> ${clip.energyType}</div>
          <div class="crop-badge"><i class="fas fa-arrows-alt"></i> CROP ALIGNMENT: ${clip.cropAlignment}</div>
          <div><i class="fas fa-expand-alt"></i> 9:16 smart crop ready</div>
        `;
        clipsGrid.appendChild(card);
      });
    }
  </script>
</body>
</html>
